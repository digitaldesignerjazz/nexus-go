# golangci-lint configuration for nexus-go
# Part of the Nexus Ecosystem (Esslinger & Co.)

run:
  timeout: 5m
  modules-download-mode: readonly

linters:
  enable:
    - errcheck
    - gosimple
    - govet
    - ineffassign
    - staticcheck
    - unused
    - gofmt
    - goimports
    - misspell
    - revive
    - unconvert
    - whitespace

linters-settings:
  gofmt:
    simplify: true
  goimports:
    local-prefixes: github.com/digitaldesignerjazz/nexus-go

issues:
  exclude-use-default: false
  max-issues-per-linter: 0
  max-same-issues: 0
